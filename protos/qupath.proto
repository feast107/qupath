syntax = "proto3";
package qupath.api;

option java_package = "io.github.qupath.api";
option java_outer_classname = "QuPathProto";
option csharp_namespace = "QuPath.Api";

message ImageId {
  string id = 1;
}

message ImageMeta {
  string id = 1;
  int32 width = 2;
  int32 height = 3;
  repeated int32 pyramid_levels = 4;
  int32 tile_size = 5;
  string pixel_format = 6; // e.g. "BGR", "GRAY"
}

message TileRequest {
  ImageId image = 1;
  int32 level = 2;
  int32 x = 3; // tile col
  int32 y = 4; // tile row
  bool compressed = 5;
}

message TileChunk {
  bytes data = 1;
  bool final_chunk = 2;
  int32 chunk_index = 3;
  int32 width = 4;
  int32 height = 5;
}

message TaskRequest {
  string name = 1;
  bytes payload = 2;
}

message TaskHandle {
  string id = 1;
}

message TaskStatus {
  string id = 1;
  string status = 2;
  double progress = 3;
}

message EventFilter {
  repeated string types = 1;
}

message Event {
  string type = 1;
  string payload = 2;
  int64 timestamp = 3;
}

message PluginDescriptor {
  string name = 1;
  string version = 2;
  repeated string services = 3;
}

message PluginCall {
  string plugin = 1;
  string method = 2;
  bytes args = 3;
}

message PluginResponse {
  bytes result = 1;
  string status = 2;
}

service ImageService {
  rpc GetImageMeta(ImageId) returns (ImageMeta);
  rpc StreamTile(TileRequest) returns (stream TileChunk);
  rpc ReadRegion(TileRequest) returns (stream TileChunk);
}

service TaskService {
  rpc SubmitTask(TaskRequest) returns (TaskHandle);
  rpc SubscribeTaskStatus(TaskHandle) returns (stream TaskStatus);
}

service EventService {
  rpc SubscribeEvents(EventFilter) returns (stream Event);
}

service PluginService {
  rpc RegisterPlugin(PluginDescriptor) returns (TaskHandle);
  rpc CallPlugin(PluginCall) returns (PluginResponse);
}
